name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # zsh ships with macOS; the integration suite mocks fzf via PATH, so
      # only the Linux leg needs packages (fzf/tmux drive the e2e suite there).
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh fzf tmux

      # -v: full assertion output — CI logs are read after the fact, so
      # verbose beats the quiet default used for local/agent runs.
      - name: Run harness meta-tests
        run: zsh tests/test_harness.zsh -v

      - name: Run unit tests
        run: zsh tests/test_zsh_snip.zsh -v

      - name: Run integration tests
        run: zsh tests/test_integration.zsh -v

      # The e2e suite needs tmux + real fzf; run it on Linux only.
      - name: Run E2E tests
        if: runner.os == 'Linux'
        run: zsh tests/test_e2e.zsh -v
